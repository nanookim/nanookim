name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *" # Update otomatis setiap 12 jam
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
     - name: generate-snake-svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: nanookim
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#bb9af7&color_dots=#1a1b26,#24283b,#414868,#7aa2f7,#bb9af7
      - name: push-snake-svg-to-output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
